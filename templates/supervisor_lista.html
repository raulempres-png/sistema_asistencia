<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mi Personal Asignado | Bocamina</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="fw-bold mb-4">Mi Personal Registrado (Solo Lectura)</h2>
        <div class="card shadow-sm border-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-secondary">
                        <tr>
                            <th>DNI</th>
                            <th>Empleado</th>
                            <th>Tipo</th>
                            <th>Contrata</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for e in empleados %}
                        <tr>
                            <td class="fw-bold">{{ e['dni'] }}</td>
                            <td>{{ e['apellido'] }}, {{ e['nombre'] }}</td>
                            <td>{{ e['categoria'] }}</td>
                            <td>{{ e['contrata'] }}</td>
                        </tr>
                        {% else %}
                        <tr><td colspan="4" class="text-center py-4">Aún no has registrado empleados.</td></tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
        <a href="/panel" class="btn btn-secondary mt-4">Volver al Panel</a>
    </div>
</body>
</html>
