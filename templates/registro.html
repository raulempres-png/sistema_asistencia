<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Personal | Trexcel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow-sm mx-auto" style="max-width: 500px;">
            <div class="card-body p-4">
                <h4 class="card-title fw-bold text-center mb-4">Añadir Nuevo Empleado</h4>
                
                {% with messages = get_flashed_messages(with_categories=true) %}
                  {% if messages %}
                    {% for category, message in messages %}
                      <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                  {% endif %}
                {% endwith %}

                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Foto del Empleado</label>
                        <input type="file" name="foto" class="form-control" accept="image/*">
                        <small class="text-muted">JPG, PNG o Captura directa.</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">DNI (Número)</label>
                        <input type="text" name="dni" class="form-control" required placeholder="8 dígitos">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nombres</label>
                        <input type="text" name="nombre" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Apellidos</label>
                        <input type="text" name="apellido" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Contrata / Empresa</label>
                        <input type="text" name="contrata" class="form-control" placeholder="Ej: Trexcel Soluciones">
                    </div>
                    <div class="mb-3">
    <label class="form-label fw-bold">Tipo de Personal</label>
    <select name="categoria" class="form-select" required>
        <option value="EMPLEADO">Empleado Regular</option>
        <option value="TELETRAM">Operador de Teletram (Externo)</option>
    </select>
</div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold">Registrar Empleado</button>
                    <a href="/panel" class="btn btn-link w-100 mt-2 text-decoration-none text-muted">Volver al Panel</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
