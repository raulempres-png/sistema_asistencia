<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Empleado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow mx-auto" style="max-width: 500px;">
            <div class="card-body">
                <h4 class="text-center mb-4 text-primary fw-bold">Registro de Nuevo Empleado</h4>
                
                {% with messages = get_flashed_messages(with_categories=true) %}
                  {% if messages %}
                    {% for category, message in messages %}
                      <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                  {% endif %}
                {% endwith %}

                <form method="POST">
                    <div class="mb-3">
                        <label class="fw-bold">DNI / Código de Barras</label>
                        <input type="text" name="dni" class="form-control" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label>Nombre</label>
                        <input type="text" name="nombre" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Apellidos</label>
                        <input type="text" name="apellido" class="form-control" required>
                    </div>
                    <div class="mb-4">
                        <label>Empresa Contratista</label>
                        <input type="text" name="contrata" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-2">Guardar Empleado</button>
                    <a href="/panel" class="btn btn-secondary w-100">Volver al Menú</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
