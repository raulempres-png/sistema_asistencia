<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Escáner - {{ tipo }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white text-center">
    <div class="container mt-5">
        <h1 class="display-4 fw-bold mb-3">ESTACIÓN DE {{ tipo }}</h1>
        <p class="lead">Por favor, pase el código de barras por el lector</p>

        {% if mensaje %}
        <div class="alert alert-{{ estado_alerta }} mx-auto" style="max-width: 600px; font-size: 1.5rem;">
            {{ mensaje }}
        </div>
        {% endif %}

        <form method="POST" class="mt-5 mx-auto" style="max-width: 400px;">
            <input type="text" name="dni" id="dni_input" class="form-control form-control-lg text-center" 
                   placeholder="Esperando lectura..." required autofocus autocomplete="off" style="font-size: 2rem;">
            <button type="submit" class="btn btn-primary mt-3 w-100 d-none">Enviar (Oculto para el Lector)</button>
        </form>
        
        <a href="/panel" class="btn btn-outline-light mt-5">Volver al Menú Principal</a>
    </div>

    <script>
        document.addEventListener('click', function() {
            document.getElementById('dni_input').focus();
        });
    </script>
</body>
</html>
