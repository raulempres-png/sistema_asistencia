<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lector de {{ tipo }} | Trexcel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .foto-validacion {
            max-width: 250px;
            height: 250px;
            object-fit: cover; /* Recorta la imagen para que sea cuadrada sin deformarse */
            border-radius: 50%; /* Foto circular */
            border: 5px solid #fff;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow-sm mx-auto text-center" style="max-width: 600px;">
            <div class="card-header {% if tipo == 'INGRESO' %}bg-primary{% else %}bg-danger{% endif %} text-white">
                <h4 class="mb-0 fw-bold">Estación de {{ tipo }}</h4>
            </div>
            <div class="card-body p-4">
                
                {% if empleado %}
                    <div class="mb-4">
                        <img src="{{ url_for('static', filename='fotos_empleados/' + empleado['foto']) }}" 
                             alt="Foto Empleado" class="foto-validacion mb-3">
                        
                        <h2 class="fw-bold">{{ empleado['nombre'] }} {{ empleado['apellido'] }}</h2>
                        <p class="text-muted fs-5">DNI: {{ empleado['dni'] }} | Contrata: {{ empleado['contrata'] }}</p>
                    </div>
                {% endif %}

                {% if mensaje %}
                    <div class="alert alert-{{ estado_alerta }} fs-4 fw-bold mb-4">{{ mensaje }}</div>
                {% endif %}

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fs-5 text-secondary">Escanee el DNI del personal</label>
                        <input type="text" name="dni" class="form-control form-control-lg text-center" 
                               placeholder="Esperando lectura..." required autofocus>
                    </div>
                    <button type="submit" class="btn btn-dark w-100">Procesar Manualmente</button>
                </form>
                
                <a href="/panel" class="btn btn-outline-secondary w-100 mt-3">Volver al Panel</a>
            </div>
        </div>
    </div>
</body>
</html>
