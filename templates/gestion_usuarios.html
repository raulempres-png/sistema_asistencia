<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Usuarios | Trexcel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm p-4">
                    <h5 class="fw-bold mb-3">Crear Nuevo Acceso</h5>
                    <form method="POST">
                        <div class="mb-3"><label>Usuario</label><input type="text" name="u" class="form-control" required></div>
                        <div class="mb-3"><label>Contraseña</label><input type="password" name="p" class="form-control" required></div>
                        <div class="mb-3"><label>Rol del Usuario</label>
                            <select name="r" class="form-select">
                                <option value="supervisor">Supervisor (Solo lectura)</option>
                                <option value="maestro">Maestro (Acceso Total)</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Crear Usuario</button>
                    </form>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card shadow-sm p-4">
                    <h5 class="fw-bold mb-3">Usuarios Activos</h5>
                    <table class="table table-hover">
                        <thead class="table-dark"><tr><th>Usuario</th><th>Rol</th></tr></thead>
                        <tbody>
                            {% for u in users %}
                            <tr><td>{{ u['usuario'] }}</td><td><span class="badge {% if u['rol'] == 'maestro' %}bg-danger{% else %}bg-primary{% endif %}">{{ u['rol'] }}</span></td></tr>
                            {% endfor %}
                        </tbody>
                    </table>
                    <a href="/panel" class="btn btn-secondary w-100 mt-3">Volver al Panel</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
