<table class="table table-hover align-middle">
    <thead class="table-dark">
        <tr>
            <th>Usuario</th>
            <th>Rol</th>
            <th class="text-center">Resetear Clave / Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for u in users %}
        <tr>
            <td class="fw-bold">{{ u['usuario'] }}</td>
            <td>
                <span class="badge {% if u['rol'] == 'maestro' %}bg-danger{% else %}bg-primary{% endif %}">
                    {{ u['rol'] | capitalize }}
                </span>
            </td>
            <td class="text-center">
                {% if u['usuario'] != session['usuario'] %}
                    <form action="/cambiar_password/{{ u['id'] }}" method="POST" class="d-flex gap-1 mb-2" autocomplete="off">
                        <input type="password" name="nueva_p" class="form-control form-control-sm" placeholder="Nueva clave" required autocomplete="new-password">
                        <button type="submit" class="btn btn-sm btn-warning">Actualizar</button>
                    </form>

                    <form action="/eliminar_usuario/{{ u['id'] }}" method="POST" onsubmit="return confirm('¿Eliminar acceso?');">
                        <button type="submit" class="btn btn-sm btn-outline-danger w-100">Eliminar Cuenta</button>
                    </form>
                {% else %}
                    <small class="text-muted italic">Tu cuenta activa</small>
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
