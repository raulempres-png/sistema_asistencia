<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Usuarios | Trexcel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm p-4">
                    <h5 class="fw-bold mb-3">Crear Nuevo Acceso</h5>
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Usuario</label>
                            <input type="text" name="u" class="form-control" placeholder="Ej: guardian_norte" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" name="p" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Rol del Usuario</label>
                            <select name="r" class="form-select" required>
                                <option value="" selected disabled>Seleccione un rol...</option>
                                <option value="supervisor">Supervisor (Solo Registro)</option>
                                <option value="guardian">Guardián (Solo Escáner)</option>
                                <option value="maestro">Maestro (Acceso Total)</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold">Crear Usuario</button>
                    </form>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow-sm p-4">
                    <h5 class="fw-bold mb-3">Usuarios Activos en el Sistema</h5>
                    <table class="table table-hover align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>Usuario</th>
                                <th>Rol asignado</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for u in users %}
                            <tr>
                                <td class="fw-bold">{{ u['usuario'] }}</td>
                                <td>
                                    {% if u['rol'] == 'maestro' %}
                                        <span class="badge bg-danger">Maestro</span>
                                    {% elif u['rol'] == 'supervisor' %}
                                        <span class="badge bg-primary">Supervisor</span>
                                    {% else %}
                                        <span class="badge bg-success">Guardián</span>
                                    {% endif %}
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                    <a href="/panel" class="btn btn-secondary w-100 mt-2">Volver al Panel Principal</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
